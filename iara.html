<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lenda da Iara</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ciano:#22d3ee;
  --azul-claro:#0ea5e9;
  --azul-escuro:#022c43;
}

body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(ellipse at 30% 20%,rgba(34,211,238,0.25),transparent 60%),
    radial-gradient(ellipse at 70% 80%,rgba(14,165,233,0.3),transparent 60%),
    linear-gradient(180deg,#020617 0%,#022c43 50%,#0ea5e9 100%);
  color:white;
  text-align:center;
  min-height:100vh;
  overflow-x:hidden;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

/* BOLHAS */
.bubbles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  overflow:hidden;
}

.bubble{
  position:absolute;
  bottom:-50px;
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.4),rgba(34,211,238,0.15));
  border:1px solid rgba(255,255,255,0.2);
  border-radius:50%;
  animation:rise linear infinite;
}

@keyframes rise{
  0%{ transform:translateY(0) translateX(0); opacity:0; }
  10%{ opacity:0.7; }
  100%{ transform:translateY(-110vh) translateX(50px); opacity:0; }
}

/* MENU / LENDA */
.tela{
  position:relative;
  z-index:5;
  width:100%;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:60px 20px 40px;
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{ opacity:0; transform:translateY(20px); }
  to{ opacity:1; transform:translateY(0); }
}

.badge{
  display:inline-block;
  padding:6px 18px;
  background:rgba(34,211,238,0.15);
  border:1px solid rgba(34,211,238,0.5);
  border-radius:20px;
  font-size:11px;
  letter-spacing:3px;
  color:var(--ciano);
  margin-bottom:18px;
  text-transform:uppercase;
}

h1.titulo{
  font-family:'Cinzel',serif;
  font-size:clamp(34px,6vw,52px);
  font-weight:700;
  letter-spacing:2px;
  margin-bottom:30px;
  background:linear-gradient(90deg,#a5f3fc,#22d3ee,#a5f3fc);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 25px rgba(34,211,238,0.5));
}

.iara-img{
  width:240px;
  max-width:60vw;
  margin:10px;
  border-radius:16px;
  filter:drop-shadow(0 0 30px rgba(34,211,238,0.6));
  animation:floatImg 4s ease-in-out infinite;
  border:2px solid rgba(34,211,238,0.4);
}

@keyframes floatImg{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-12px); }
}

.historia{
  max-width:520px;
  margin:30px auto 10px;
  background:rgba(2,6,23,0.55);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  padding:24px 28px;
  border-radius:18px;
  border:1px solid rgba(34,211,238,0.3);
  box-shadow:0 0 40px rgba(34,211,238,0.2),inset 0 0 20px rgba(34,211,238,0.05);
  font-size:15px;
  line-height:1.7;
  color:#e0f2fe;
  font-weight:300;
}

.historia::before{
  content:"❝";
  display:block;
  font-family:'Cinzel',serif;
  font-size:48px;
  color:var(--ciano);
  line-height:0.4;
  margin-bottom:8px;
  opacity:0.6;
}

.btn-comecar{
  margin-top:30px;
  padding:16px 40px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#0ea5e9,var(--ciano));
  color:white;
  font-size:16px;
  font-weight:600;
  font-family:'Inter',sans-serif;
  letter-spacing:1px;
  cursor:pointer;
  text-transform:uppercase;
  box-shadow:0 8px 30px -8px rgba(34,211,238,0.7);
  transition:all 0.3s;
}

.btn-comecar:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 40px -8px rgba(34,211,238,0.9);
}

.voltar{
  position:fixed;
  top:16px;
  left:16px;
  padding:10px 16px;
  background:rgba(2,6,23,0.7);
  backdrop-filter:blur(10px);
  border:1px solid rgba(34,211,238,0.4);
  color:#a5f3fc;
  border-radius:12px;
  cursor:pointer;
  font-size:13px;
  font-weight:500;
  z-index:50;
  font-family:'Inter',sans-serif;
  transition:all 0.3s;
}

.voltar:hover{
  background:rgba(34,211,238,0.2);
  color:white;
}

/* GAME */
#game{
  position:relative;
  z-index:5;
  display:none;
  flex-direction:column;
  align-items:center;
  padding:30px 10px 20px;
  min-height:100vh;
}

.hud{
  font-family:'Cinzel',serif;
  font-size:22px;
  letter-spacing:2px;
  color:var(--ciano);
  margin-bottom:14px;
  padding:8px 24px;
  background:rgba(2,6,23,0.6);
  backdrop-filter:blur(8px);
  border:1px solid rgba(34,211,238,0.4);
  border-radius:30px;
}

canvas{
  background:linear-gradient(180deg,#022c43,#0ea5e9);
  border-radius:16px;
  max-width:100%;
  height:auto;
  touch-action:none;
  border:2px solid rgba(34,211,238,0.3);
  box-shadow:0 0 50px rgba(34,211,238,0.2);
}

.lane-buttons{
  display:flex;
  gap:8px;
  margin-top:20px;
  width:100%;
  max-width:400px;
}

.lane-buttons button{
  flex:1;
  padding:18px 0;
  font-size:24px;
  background:rgba(14,165,233,0.5);
  backdrop-filter:blur(8px);
  border:2px solid rgba(34,211,238,0.5);
  border-radius:14px;
  color:white;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:all 0.15s;
}

.lane-buttons button:active{
  background:var(--ciano);
  color:#022c43;
  transform:scale(0.95);
  border-color:white;
}

.feedback{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  font-family:'Cinzel',serif;
  font-size:48px;
  font-weight:700;
  letter-spacing:3px;
  pointer-events:none;
  text-shadow:0 0 20px currentColor;
  z-index:40;
  animation:popIn 0.3s ease;
}

@keyframes popIn{
  from{ transform:translate(-50%,-50%) scale(0.5); opacity:0; }
  to{ transform:translate(-50%,-50%) scale(1); opacity:1; }
}
</style>
</head>

<body>

<!-- BOLHAS -->
<div class="bubbles" id="bubbles"></div>

<!-- BOTÃO VOLTAR -->
<button class="voltar" onclick="voltar()">← Menu</button>

<!-- MENU -->
<div id="menu" class="tela">
  <div class="badge">✦ Lenda Amazônica ✦</div>
  <h1 class="titulo">🌊 Lenda da Iara</h1>

  <img src="iara.png" class="iara-img" alt="Iara">

  <div class="historia">
    Iara é uma sereia das águas da Amazônia. Diz a lenda que ela encanta
    pescadores com sua beleza e seu canto, fazendo com que mergulhem no rio
    e nunca mais voltem. Você consegue resistir ao seu ritmo?
  </div>

  <button class="btn-comecar" onclick="start()">Começar</button>
</div>

<!-- JOGO -->
<div id="game">
  <div class="hud">PONTOS · <span id="score">0</span></div>
  <canvas id="canvas" width="400" height="400"></canvas>

  <div class="lane-buttons">
    <button data-lane="0">⬅️</button>
    <button data-lane="1">⬇️</button>
    <button data-lane="2">⬆️</button>
    <button data-lane="3">➡️</button>
  </div>
</div>

<div id="feedback" class="feedback"></div>

<script>
// 🎵 MÚSICA
let audio = new Audio("ate-que-durou-ao-vivo.mp3");
audio.volume = 0.5;

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let notes = [];
let score = 0;
let lanes = [80,160,240,320];
let spawnInterval = null;
let running = false;

function start(){
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="flex";

  notes = [];
  score = 0;
  document.getElementById("score").innerText = score;

  audio.currentTime = 0;
  audio.play().catch(()=>{});

  if(spawnInterval) clearInterval(spawnInterval);
  spawnInterval = setInterval(spawn,700);

  if(!running){
    running = true;
    draw();
  }
}

function voltar(){
  audio.pause();
  audio.currentTime = 0;
  if(spawnInterval){ clearInterval(spawnInterval); spawnInterval = null; }
  window.location.href = "index.html";
}

function spawn(){
  let lane = lanes[Math.floor(Math.random()*4)];
  notes.push({x: lane, y: 0});
}

function draw(){
  ctx.fillStyle="rgba(0,50,80,0.3)";
  ctx.fillRect(0,0,400,400);

  // Linha de acerto com brilho
  let grad = ctx.createLinearGradient(0,335,400,345);
  grad.addColorStop(0,"rgba(34,211,238,0.3)");
  grad.addColorStop(0.5,"rgba(34,211,238,1)");
  grad.addColorStop(1,"rgba(34,211,238,0.3)");
  ctx.fillStyle = grad;
  ctx.fillRect(0,338,400,6);

  ctx.fillStyle="white";
  ctx.font="30px Arial";
  ctx.fillText("⬅️",60,380);
  ctx.fillText("⬇️",140,380);
  ctx.fillText("⬆️",220,380);
  ctx.fillText("➡️",300,380);

  // Notas com glow
  for(let i = notes.length - 1; i >= 0; i--){
    let n = notes[i];
    n.y += 6;
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#22d3ee";
    ctx.fillStyle = "#a5f3fc";
    ctx.fillRect(n.x-22, n.y, 44, 22);
    ctx.shadowBlur = 0;

    if(n.y > 400){
      notes.splice(i,1);
      show("MISS","#fca5a5");
    }
  }

  requestAnimationFrame(draw);
}

function show(text,color){
  let fb = document.getElementById("feedback");
  fb.innerText = text;
  fb.style.color = color;
  fb.style.animation = "none";
  void fb.offsetWidth;
  fb.style.animation = "popIn 0.3s ease";
  setTimeout(()=>{ if(fb.innerText===text) fb.innerText=""; },400);
}

function hit(laneIndex){
  let target = lanes[laneIndex];
  let acertou = false;

  for(let i = notes.length - 1; i >= 0; i--){
    let n = notes[i];
    if(Math.abs(n.x - target) < 10){
      if(n.y > 320 && n.y < 360){
        score += 100;
        show("PERFECT","#22d3ee");
        notes.splice(i,1);
        acertou = true;
      } else if(n.y > 280){
        score += 50;
        show("GOOD","#a5f3fc");
        notes.splice(i,1);
        acertou = true;
      }
      if(acertou) break;
    }
  }

  if(!acertou) show("MISS","#fca5a5");
  document.getElementById("score").innerText = score;
}

document.addEventListener("keydown", e=>{
  let map = {ArrowLeft:0, ArrowDown:1, ArrowUp:2, ArrowRight:3};
  let i = map[e.key];
  if(i === undefined) return;
  hit(i);
});

document.querySelectorAll(".lane-buttons button").forEach(btn=>{
  let lane = parseInt(btn.dataset.lane);
  btn.addEventListener("touchstart", e=>{ e.preventDefault(); hit(lane); }, {passive:false});
  btn.addEventListener("click", ()=>hit(lane));
});

// BOLHAS
const bubbles = document.getElementById("bubbles");
for(let i=0; i<20; i++){
  const b = document.createElement("div");
  b.className = "bubble";
  const size = 8 + Math.random()*30;
  b.style.width = size+"px";
  b.style.height = size+"px";
  b.style.left = Math.random()*100+"%";
  b.style.animationDuration = (8 + Math.random()*10)+"s";
  b.style.animationDelay = Math.random()*8+"s";
  bubbles.appendChild(b);
}
</script>

</body>
</html>
