<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>TESTE Amazonia</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; background: red; }
    #info { position: fixed; top: 10px; left: 10px; z-index: 999;
            background: yellow; color: black; padding: 10px; font-size: 18px; }
  </style>
</head>
<body>
  <div id="info">SE VER ISSO, A PÁGINA CARREGOU</div>

  <a-scene background="color: #87CEEB">
    <!-- Céu azul claro -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- Chão verde -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#7CFC00"></a-plane>

    <!-- Cubo vermelho gigante na frente -->
    <a-box position="0 1.5 -3" width="2" height="2" depth="2" color="#FF0000"></a-box>

    <!-- Esfera amarela à direita -->
    <a-sphere position="3 1 -2" radius="1" color="#FFFF00"></a-sphere>

    <!-- Cilindro azul à esquerda -->
    <a-cylinder position="-3 1 -2" radius="0.7" height="2" color="#0000FF"></a-cylinder>

    <!-- Texto -->
    <a-text value="TESTE OK!" position="0 3 -3" color="white" align="center" width="10"></a-text>

    <!-- Luz forte -->
    <a-light type="ambient" intensity="2"></a-light>

    <!-- Câmera olhando pro cubo vermelho -->
    <a-entity position="0 1.6 2">
      <a-camera look-controls touch-enabled></a-camera>
    </a-entity>
  </a-scene>
</body>
</html>
